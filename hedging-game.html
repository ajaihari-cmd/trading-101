<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Trading 101</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    /* Reds */
    --red-primary: #D61F3A;
    --red-hover:   #BE1831;
    --red-soft:    #FCEBED;
    /* Slate / navy */
    --slate-900: #354258;
    --slate-800: #3B4961;
    --slate-700: #5A6475;
    --slate-300: #D7DDE7;
    /* Backgrounds */
    --bg-main:     #F7F9FC;
    --card-bg:     #FFFFFF;
    --panel-light: #F3F5F8;
    /* Text */
    --text-primary:   #111827;
    --text-secondary: #5B6472;
    --text-muted:     #8B93A1;
    /* Functional */
    --buy:    #15803D;
    --sell:   #D61F3A;
    --hedged: #2A3F66;
    /* Soft border */
    --border: rgba(53, 66, 88, 0.08);
    --border-strong: rgba(53, 66, 88, 0.16);
    /* Shadows */
    --shadow:     0 2px 10px rgba(16, 24, 40, 0.06);
    --shadow-lg:  0 6px 18px rgba(16, 24, 40, 0.10);

    /* Backwards-compatible aliases for any references that escaped my pass */
    --bg: var(--bg-main);
    --panel: var(--card-bg);
    --panel-2: var(--panel-light);
    --text: var(--text-primary);
    --muted: var(--text-muted);
    --accent: var(--red-primary);
    --accent-soft: var(--red-soft);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg-main); color: var(--text-primary); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px 40px; }

  h1 { margin: 0 0 6px; font-size: 30px; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary); }
  h1 span { color: var(--red-primary); }
  .sub { color: var(--text-secondary); margin-bottom: 22px; font-size: 14px; max-width: 820px; line-height: 1.55; }
  .stage { display: none; }
  .stage.active { display: block; }

  /* Old step-bar pills (still in DOM for some sub-steps) */
  .step-bar { display: flex; gap: 8px; margin-bottom: 22px; }
  .step-bar .pill { flex: 1; padding: 10px 14px; border-radius: 10px; background: var(--card-bg); color: var(--text-muted); font-size: 11px; text-align: center; border: 1px solid var(--border); font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: background 0.15s ease, color 0.15s ease, transform 0.05s, box-shadow 0.15s ease; user-select: none; box-shadow: var(--shadow); }
  .step-bar .pill:hover { background: var(--panel-light); color: var(--text-secondary); box-shadow: var(--shadow-lg); }
  .step-bar .pill:active { transform: translateY(1px); }
  .step-bar .pill.active { background: var(--red-primary); color: #ffffff; border-color: var(--red-primary); }
  .step-bar .pill.done { background: var(--red-soft); color: var(--red-primary); border-color: var(--red-soft); }

  /* Cards / panels */
  .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 24px 26px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .panel h2 { margin: 0 0 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); font-weight: 600; }
  /* Dark slate panel variant — used for definitions / "YOUR FILL" strips / emphasis */
  .panel.dark, .panel-dark { background: linear-gradient(180deg, var(--slate-800) 0%, var(--slate-900) 100%); color: #ffffff; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 10px 28px rgba(53,66,88,0.20); }
  .panel.dark h2, .panel-dark h2 { color: rgba(255,255,255,0.62); }

  /* Formula row (flat / fut / basis cards) */
  .formula { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; align-items: stretch; gap: 14px; }
  .formula .block { background: var(--panel-light); border: 1px solid var(--border); border-radius: 14px; padding: 22px 20px; text-align: center; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6); }
  .formula .block .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
  .formula .block .val { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .formula .block.flat .val { color: var(--text-primary); }
  .formula .block.fut .val { color: var(--hedged); }
  .formula .block.basis .val { color: var(--red-primary); }
  .formula .op { font-size: 22px; color: var(--text-muted); font-weight: 700; align-self: center; }

  /* Buttons */
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; }
  button { font-family: inherit; font-size: 14px; padding: 14px 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; letter-spacing: 0.01em; transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease, color 0.15s ease, border-color 0.15s ease; }
  button:hover:not(:disabled) { transform: translateY(-1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-accent { background: var(--red-primary); color: #ffffff; height: 52px; box-shadow: 0 6px 14px rgba(214, 31, 58, 0.22); }
  .btn-accent:hover:not(:disabled) { background: var(--red-hover); box-shadow: 0 10px 22px rgba(214, 31, 58, 0.28); }
  .btn-hedge { background: var(--hedged); color: #ffffff; height: 52px; box-shadow: 0 6px 14px rgba(42, 63, 102, 0.22); }
  .btn-hedge:hover:not(:disabled) { background: #1F3057; box-shadow: 0 10px 22px rgba(42, 63, 102, 0.30); }
  .btn-open { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-strong); height: 52px; box-shadow: var(--shadow); }
  .btn-open:hover:not(:disabled) { background: var(--panel-light); border-color: rgba(53,66,88,0.30); }
  .btn-ghost { background: var(--card-bg); color: var(--text-secondary); border: 1px solid var(--border); box-shadow: var(--shadow); }
  .btn-ghost:hover:not(:disabled) { background: var(--panel-light); color: var(--text-primary); border-color: var(--border-strong); }

  /* Math card row (up / down scenarios, hedged vs open ledger) */
  .math-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; }
  .math-card { background: var(--panel-light); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
  .math-card.up   { border-left: 3px solid var(--sell); }
  .math-card.down { border-left: 3px solid var(--buy); }
  .math-card h3 { margin: 0 0 12px; font-size: 13px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-primary); }
  .math-line { display: grid; grid-template-columns: 1fr auto; padding: 7px 0; border-bottom: 1px dashed var(--border-strong); font-variant-numeric: tabular-nums; font-size: 13px; color: var(--text-secondary); }
  .math-line:last-child { border-bottom: none; padding-top: 12px; border-top: 1px solid var(--border-strong); font-weight: 700; font-size: 15px; margin-top: 6px; color: var(--text-primary); }
  .math-card .gain { color: var(--buy); }
  .math-card .loss { color: var(--sell); }
  .math-card .net  { color: var(--red-primary); }
  .math-divider { display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.22em; font-weight: 600; }

  /* 10-day grid */
  .day-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin-top: 12px; }
  .day-cell { background: var(--panel-light); border: 1px solid var(--border); border-radius: 10px; padding: 10px 4px; text-align: center; font-size: 11px; color: var(--text-secondary); position: relative; transition: box-shadow 0.15s ease, transform 0.15s ease; }
  .day-cell.current { background: var(--red-primary); color: #ffffff; border-color: var(--red-primary); box-shadow: 0 8px 18px rgba(214,31,58,0.25); transform: translateY(-1px); }
  .day-cell.done { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-secondary); }
  .day-cell .d { font-weight: 700; font-size: 12px; color: var(--text-primary); letter-spacing: 0.01em; }
  .day-cell.current .d { color: #ffffff; }
  .day-cell.done .d { color: var(--text-secondary); }
  .day-cell .p { font-size: 11px; margin-top: 4px; font-variant-numeric: tabular-nums; }

  /* Stats KPI cards */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .stat { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; box-shadow: var(--shadow); }
  .stat .lbl { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.18em; font-weight: 600; }
  .stat .val { font-size: 24px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--text-primary); }

  .pnl-pos { color: var(--buy); }
  .pnl-neg { color: var(--sell); }
  .chart-wrap { height: 320px; position: relative; }

  /* Scenario / callout strip */
  .scenario { background: var(--panel-light); border: 1px solid var(--border); border-left: 3px solid var(--red-primary); padding: 16px 20px; border-radius: 12px; margin-bottom: 18px; font-size: 14px; line-height: 1.55; color: var(--text-primary); box-shadow: var(--shadow); }
  .scenario strong { color: var(--red-primary); font-weight: 700; }

  details { background: var(--panel-light); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-top: 12px; font-size: 13px; color: var(--text-secondary); }
  details summary { cursor: pointer; color: var(--text-primary); font-weight: 600; }
  details p { margin: 8px 0 0; }

  /* Status / role pill — premium slate look */
  .role-pill { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(180deg, var(--slate-800) 0%, var(--slate-900) 100%); color: #ffffff; padding: 7px 14px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; box-shadow: 0 4px 12px rgba(53,66,88,0.22); border: 1px solid rgba(255,255,255,0.06); }

  .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }

  /* Ledger table */
  .ledger { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; font-size: 13px; }
  .ledger th, .ledger td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); color: var(--text-primary); }
  .ledger th { color: var(--text-muted); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; }
  .ledger td.l { text-align: left; }
  .ledger tr.totals td { font-weight: 700; border-top: 2px solid var(--slate-900); border-bottom: none; padding-top: 14px; font-size: 15px; color: var(--text-primary); }

  /* Legend (chart series) */
  .legend { display: flex; gap: 20px; margin-bottom: 10px; font-size: 12px; color: var(--text-secondary); }
  .legend span { display: inline-flex; align-items: center; gap: 8px; }
  .legend i { width: 16px; height: 3px; display: inline-block; border-radius: 2px; }

  /* Badges */
  .badge { padding: 4px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
  .badge-hedged { background: rgba(42,63,102,0.10); color: var(--hedged); }
  .badge-open   { background: var(--red-soft); color: var(--red-primary); }

  @media (max-width: 800px) {
    .wrap { padding: 20px 16px 32px; }
    .formula { grid-template-columns: 1fr; }
    .math-row { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr; }
    .day-grid { grid-template-columns: repeat(5, 1fr); }
  }

  /* Progress dots */
  .step-dot-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; width: 22px; height: 22px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #D1D5DB; transition: transform 0.15s ease, background 0.15s ease, width 0.15s ease, height 0.15s ease; }
  .step-dot.active { background: var(--red-primary); width: 12px; height: 12px; box-shadow: 0 0 0 4px rgba(214,31,58,0.12); }
  .step-dot.done { background: var(--red-primary); opacity: 0.45; }
  .step-dot-wrap:hover .step-dot { transform: scale(1.25); }
  .step-tip {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--slate-900);
    color: #ffffff;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 8px;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.12s ease, visibility 0.12s ease;
    z-index: 1000;
    max-width: 320px;
    white-space: normal;
    text-align: left;
    line-height: 1.35;
    box-shadow: 0 12px 28px rgba(16,24,40,0.18);
  }
  .step-tip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: var(--slate-900);
  }
  .step-dot-wrap:hover .step-tip { opacity: 1; visibility: visible; }
  .step-tip-num { color: var(--red-primary); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; display: block; margin-bottom: 4px; opacity: 0.9; font-weight: 700; }

  /* Risk slide P&L card flash */
  .risk-pnl-card { transition: background-color 0.25s, box-shadow 0.25s; }
  .risk-pnl-card.flash { animation: pnlPulse 0.55s ease-out; }
  @keyframes pnlPulse {
    0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(214,31,58,0.55); }
    40%  { transform: scale(1.035); box-shadow: 0 0 0 12px rgba(214,31,58,0); }
    100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(214,31,58,0); }
  }

  /* Selection */
  ::selection { background: rgba(214,31,58,0.22); color: var(--text-primary); }

  /* Subtle scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 100px; border: 2px solid var(--bg-main); }
  ::-webkit-scrollbar-thumb:hover { background: var(--slate-700); }

  /* ========== QUIZ SLIDES ========== */
  .quiz-badge { display:inline-block; background: #D61F3A; color:#ffffff; padding:6px 22px; border-radius:100px; font-size:12px; letter-spacing:0.22em; font-weight:800; box-shadow: 0 4px 12px rgba(214,31,58,0.22); }
  .quiz-q { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1.4; margin: 16px auto 22px; max-width: 820px; text-align:center; }
  .quiz-opts { display:grid; gap:10px; max-width: 760px; margin: 0 auto; }
  .quiz-opt { display:flex; align-items:center; gap:14px; padding: 13px 18px; background: var(--card-bg); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.18s ease; text-align: left; font-family: inherit; font-size: 15px; color: var(--text-primary); width: 100%; box-shadow: var(--shadow); }
  .quiz-opt:hover:not(:disabled) { border-color: #1F3B5C; background: #FBFCFE; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(53,66,88,0.12); }
  .quiz-opt:disabled { cursor: default; opacity: 0.5; }
  .quiz-opt .lbl { width:32px; height:32px; min-width:32px; border-radius:50%; background: #EEF1F6; color: #1F3B5C; font-weight:800; font-size: 14px; display:flex; align-items:center; justify-content:center; transition: all 0.18s ease; }
  .quiz-opt .txt { flex:1; line-height: 1.4; }
  .quiz-opt.correct { background: #ECFDF3 !important; border-color: #15803D !important; opacity: 1 !important; box-shadow: 0 8px 22px rgba(21,128,61,0.18) !important; }
  .quiz-opt.correct .lbl { background: #15803D; color: #ffffff; }
  .quiz-opt.correct::after { content:'✓'; margin-left:auto; color:#15803D; font-weight:800; font-size:20px; }
  .quiz-opt.incorrect { background: #FEF2F2 !important; border-color: #DC2626 !important; }
  .quiz-opt.incorrect .lbl { background: #DC2626; color: #ffffff; }
  .quiz-opt.incorrect::after { content:'✗'; margin-left:auto; color:#DC2626; font-weight:800; font-size:18px; }
  .quiz-expl { display:none; margin: 22px auto 0; max-width: 820px; padding: 16px 22px; background: linear-gradient(180deg, #ECFDF3 0%, #F0FDF4 100%); border: 1px solid #BBF7D0; border-radius: 12px; box-shadow: 0 6px 18px rgba(21,128,61,0.10); }
  .quiz-expl.visible { display:block; animation: quizFadeIn 0.35s ease; }
  @keyframes quizFadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .quiz-expl .hdr { font-size: 13px; letter-spacing: 0.18em; font-weight:800; color: #15803D; text-transform: uppercase; margin-bottom: 6px; }
  .quiz-expl .body { font-size: 14px; line-height: 1.55; color: #1F3B5C; }
  .quiz-reset { display:inline-block; margin-top: 14px; padding: 6px 14px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 100px; font-size: 11px; cursor:pointer; letter-spacing:0.08em; }
  .quiz-reset:hover { background: var(--panel-light); color: var(--text-primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="header-row">
    <div>
      <h1>Trading <span>101</span></h1>
      <div class="sub">A 10-day walk through what a basis trade actually looks like — and what hedging the futures component does to your P&amp;L.</div>
    </div>
    <span class="role-pill">YOU = GULF COAST BASIS BUYER</span>
  </div>


  <!-- ============== STAGE 1: HEDGE WALKTHROUGH (PROGRESSIVE) ============== -->
  <div class="stage active" id="stage1">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 14px;">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); font-weight:700;">
        Concept <span id="subStepNum">1</span> of <span id="subStepTotal">9</span>
      </div>
      <div style="display:flex; gap:8px; align-items:center;" id="subStepDots"></div>
    </div>

    <div id="subStepContent"></div>

    <div class="actions">
      <button class="btn-ghost" id="subBackBtn" onclick="subStep(-1)">← Back</button>
      <button class="btn-accent" id="subNextBtn" onclick="subStep(1)">Next →</button>
    </div>
  </div>

</div>

<script>
// ============================================================
// THE HEDGING GAME — Gulf Coast basis with NYMEX HO hedge
// ============================================================

const VOLUME_KB = 25;            // 25 thousand barrels
const GAL_PER_BBL = 42;
const VOLUME_GAL = VOLUME_KB * 1000 * GAL_PER_BBL;  // 1,050,000 gallons

const INITIAL_FUTURES = 4.05;
const INITIAL_BASIS = -0.08;
const INITIAL_FLAT = +(INITIAL_FUTURES + INITIAL_BASIS).toFixed(4);  // $3.9700
const NUM_DAYS = 10;

let state;
let chart;

function freshState() {
  // Generate 10 days of futures + basis moves
  const futPath = [INITIAL_FUTURES];
  const basisPath = [INITIAL_BASIS];
  for (let i = 1; i <= NUM_DAYS; i++) {
    // Futures moves more (1-3¢ typical, occasional shock)
    const fShock = Math.random() < 0.20 ? (Math.random() < 0.5 ? -1 : 1) * (0.05 + Math.random() * 0.05) : 0;
    const fDrift = (Math.random() - 0.5) * 0.04;
    futPath.push(+(futPath[i-1] + fDrift + fShock).toFixed(4));
    // Basis moves smaller (sub-cent typical, occasional 1-2¢)
    const bShock = Math.random() < 0.15 ? (Math.random() < 0.5 ? -1 : 1) * 0.02 : 0;
    const bDrift = (Math.random() - 0.5) * 0.008;
    basisPath.push(+(basisPath[i-1] + bDrift + bShock).toFixed(4));
  }
  return {
    stage: 1,
    subStep: 1,        // sub-step within stage 2
    strategy: null,    // 'open' or 'hedge'
    currentDay: 0,     // 0 = Day 0 (entry). Plays out to 10.
    futPath,
    basisPath,
    finished: false
  };
}

// ============================================================
// STAGE 2 — PROGRESSIVE CONCEPT WALKTHROUGH
// ============================================================

const SUB_STEPS = [
  {
    // 1 — Setup: you're Pilot's newest diesel trader, self-supplying our stores.
    title: "You're Pilot's newest diesel trader and you have to self-supply our stores with diesel. First job: buy 25,000 barrels for some stores on the Eastern Seaboard.",
    body: `
      <div class="panel" style="padding: 12px 14px;">
        <h2 style="margin: 0 0 8px;">The assignment</h2>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;">
          <div style="font-size:52px;line-height:1;">🛢️</div>
          <div>
            <div style="font-size: 20px; font-weight: 700; line-height: 1.2;">You buy 25 kb of physical diesel now. It takes 10 days to ship to the stores — when it arrives, you sell it.</div>
            <div style="color:var(--muted); margin-top:4px; font-size:12px;">25,000 barrels  ·  1,050,000 gallons  ·  load on the Gulf Coast → deliver to Pilot stores 10 days later</div>
          </div>
        </div>
        <div style="background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 6px; padding: 8px 12px; margin-top: 10px;">
          <p style="margin:0; font-size:12px; color:var(--text); line-height:1.45;">
            <strong style="color:var(--accent);">🔒 The rules.</strong> &nbsp; The barrels are <strong>in transit for 10 days</strong> — you can't react to news mid-flight, can't bail out on Day 2 if prices spike, can't sell early. Whatever flat price the market gives you when the trucks arrive on Day 10 is the price you sell at. The <strong>only</strong> thing you control up front is whether to hedge.
          </p>
        </div>
        <p style="color:var(--text); margin: 10px 0 0; font-size:15px; font-weight: 600; line-height:1.4;">
          What now? What do you do? You have <span style="color:var(--accent);">two options</span>:
        </p>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px;">
          <div style="background: var(--panel-2); border-left: 4px solid var(--hedged); border-radius: 6px; padding: 8px 12px;">

        </div>
        <div style="font-size:21px; font-weight:900; margin-top:8px; line-height:1.25; letter-spacing:-0.2px;">Goldman Slashes Diesel Year-End Target to $3.50/gal</div>
        <div style="font-size:11px; color:#cccccc; margin-top:2px;">Cites slowing freight demand and ample refining slate into Q4.</div>
      </div>`;
  }
  return '';
}

function updateRiskUI() {
  const line = document.getElementById('riskLine');
  const dots = document.getElementById('riskDots');
  const hdl  = document.getElementById('riskHeadline');
  if (!line || !dots || !hdl) return;
  // Build polyline up to current day (single-point fallback if at day 0)
  const pts = riskDayIdx === 0
    ? '40,113'
    : RISK_PATH.slice(0, riskDayIdx + 1).map(d => `${d.x},${d.y}`).join(' ');
  line.setAttribute('points', pts);
  // Rebuild all dots up to current day
  dots.innerHTML = '';
  for (let k = 0; k <= riskDayIdx; k++) {
    const p = RISK_PATH[k];
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', String(p.x));
    c.setAttribute('cy', String(p.y));
    c.setAttribute('r',  p.hl ? '4.5' : '3');
    c.setAttribute('fill', k === 10 ? '#1a1a1a' : '#D61F3A');
    if (p.hl) { c.setAttribute('stroke', '#fff'); c.setAttribute('stroke-width', '1'); }
    dots.appendChild(c);
  }
  // Headline: show only on the CURRENT day if it has one; cleared otherwise
  const current = RISK_PATH[riskDayIdx];
  if (current.hl) {
    hdl.innerHTML = renderHeadlineMock(current.hl);
    hdl.style.opacity = '1';
  } else {
    hdl.innerHTML = '';
    hdl.style.opacity = '0';
  }
  // Price buildup: basis locked, futures moves, flat = basis + futures
  const futures = +(current.price + 0.08).toFixed(4);
  const futEl = document.getElementById('riskFutures');
  const flatEl = document.getElementById('riskFlat');
  if (futEl) futEl.textContent = '$' + futures.toFixed(4);
  if (flatEl) flatEl.textContent = '$' + current.price.toFixed(4);
  // Update P&L row
  const pnl = Math.round((current.price - 3.97) * 1050000);
  const pnlSign = pnl < 0 ? '−' : (pnl > 0 ? '+' : '');
  const pnlStr  = pnlSign + '$' + Math.abs(pnl).toLocaleString('en-US');
  const pct = pnl / 4168500 * 100;
  const pctStr = (pct >= 0 ? '+' : '−') + Math.abs(pct).toFixed(1) + '%';
  document.getElementById('riskDay').textContent = String(riskDayIdx);
  document.getElementById('riskPrice').textContent = '$' + current.price.toFixed(4);
  document.getElementById('riskPnl').textContent = pnlStr;
  document.getElementById('riskPct').textContent = pctStr;

  // Day-over-day flat-price delta banner
  const deltaBanner = document.getElementById('riskDelta');
  const deltaLabel  = document.getElementById('riskDeltaLabel');
  const deltaPrices = document.getElementById('riskDeltaPrices');
  const deltaValue  = document.getElementById('riskDeltaValue');
  const deltaPnlEl  = document.getElementById('riskDeltaPnl');
  if (deltaBanner && deltaValue) {
    if (riskDayIdx === 0) {
      deltaLabel.textContent  = 'Day 0 · entry';
      deltaPrices.textContent = 'Flat $3.9700';
      deltaValue.textContent  = '—';
      deltaValue.style.color  = 'var(--muted)';
      deltaPnlEl.textContent  = '$0';
      deltaPnlEl.style.color  = 'var(--muted)';
      deltaBanner.style.background = 'var(--panel-2)';
    } else {
      const prev = RISK_PATH[riskDayIdx - 1];
      const dPrice = +(current.price - prev.price).toFixed(4);
      const dPnl   = Math.round(dPrice * 1050000);
      const sign   = dPrice > 0 ? '+' : (dPrice < 0 ? '−' : '');
      const color  = dPrice > 0 ? 'var(--buy)' : (dPrice < 0 ? 'var(--sell)' : 'var(--muted)');
      deltaLabel.textContent  = 'Day ' + (riskDayIdx - 1) + ' → Day ' + riskDayIdx;
      deltaPrices.textContent = 'Flat $' + prev.price.toFixed(4) + ' → $' + current.price.toFixed(4);
      deltaValue.textContent  = sign + '$' + Math.abs(dPrice).toFixed(4);
      deltaValue.style.color  = color;
      const pnlSignBig = dPnl > 0 ? '+' : (dPnl < 0 ? '−' : '');
      deltaPnlEl.textContent  = pnlSignBig + '$' + Math.abs(dPnl).toLocaleString('en-US');
      deltaPnlEl.style.color  = color;
      // Subtle background tint to reinforce direction
      deltaBanner.style.background = dPrice > 0 ? 'rgba(27,127,58,0.06)' : (dPrice < 0 ? 'rgba(214,31,58,0.06)' : 'var(--panel-2)');
    }
  }
  // Color the P&L card: green if positive, red if negative, gray if zero. Flash on change.
  const pnlCard = document.getElementById('riskPnlCard');
  if (pnlCard) {
    let bg = 'var(--muted)';
    if (pnl > 0) bg = 'var(--buy)';
    else if (pnl < 0) bg = 'var(--sell)';
    pnlCard.style.background = bg;
    pnlCard.classList.remove('flash');
    // Force reflow so the animation re-triggers
    void pnlCard.offsetWidth;
    pnlCard.classList.add('flash');
  }
  // Update button label
  const btn = document.getElementById('riskNextBtn');
  if (btn) {
    if (riskDayIdx >= 10) { btn.textContent = '↻ Restart'; btn.dataset.mode = 'restart'; }
    else { btn.textContent = 'Next day → D' + (riskDayIdx + 1); btn.dataset.mode = 'next'; }
  }
}

function nextRiskDay() {
  const btn = document.getElementById('riskNextBtn');
  if (btn && btn.dataset.mode === 'restart') { riskDayIdx = 0; updateRiskUI(); return; }
  if (riskDayIdx >= 10) return;
  riskDayIdx += 1;
  updateRiskUI();
}

function setupRiskInteractive() {
  riskDayIdx = 0;
  updateRiskUI();
}

//   step 3: + SELL a spread math
//   step 4: + SELL contango P&L

let spreadStep = 0;
function setupSpreadInteractive() {
  spreadStep = 0;
  updateSpreadUI();
}
function nextSpreadStep() {
  spreadStep++;

  updateSpreadUI();
}
function updateSpreadUI() {
  const btn = document.getElementById('spreadStepBtn');
  if (!btn) return;
  // Position-table rows
  const rowBuyAction  = document.getElementById('rowBuyAction');
  const rowBuyResult  = document.getElementById('rowBuyResult');
  const rowSellAction = document.getElementById('rowSellAction');

  const buyContango  = document.getElementById('spreadBuyContango');
  const buyBackward  = document.getElementById('spreadBuyBackward');
  // SELL P&L panels (contango at step 5, switches to backwardation at step 6)
  const sellContango = document.getElementById('spreadSellContango');
  const sellBackward = document.getElementById('spreadSellBackward');

  // Step 1: BUY action + new position rows revealed
  // Step 2: + BUY contango P&L
  // Step 3: BUY backwardation P&L replaces BUY contango (rows stay)
  // Step 4: + SELL action + new position rows
  // Step 5: + SELL contango P&L

  if (rowBuyAction)  rowBuyAction.style.display  = spreadStep >= 1 ? 'grid' : 'none';

  if (rowSellResult) rowSellResult.style.display = spreadStep >= 4 ? 'grid' : 'none';
  if (sellContango)  sellContango.style.display  = spreadStep === 5 ? 'block' : 'none';
  if (sellBackward)  sellBackward.style.display  = spreadStep >= 6 ? 'block' : 'none';

  const labels = [
    'Click to reveal: BUY a spread →',
    'Show the contango math →',
    'Now flip to backwardation →',
    'Show SELL a spread →',
    'Show the SELL contango math →',
    'Flip SELL to backwardation →',
    '↻ Restart',
  ];
  btn.textContent = labels[spreadStep] || labels[0];
  btn.style.background = spreadStep === 6 ? 'var(--text-primary)' : 'var(--red-primary)';
}

// ============================================================
// HEDGE SLIDE (sub-step 6) — interactive futures-price calculator
// ============================================================
function setupHedgeInteractive() {
  const slider = document.getElementById('hedgeFutSlider');
  const numInp = document.getElementById('hedgeFutNum');
  if (!slider || !numInp) return;
  const apply = (raw) => {
    let v = parseFloat(raw);
    if (isNaN(v)) return;
    v = Math.max(3.00, Math.min(5.20, v));
    slider.value = v;
    if (document.activeElement !== numInp) numInp.value = v.toFixed(4);
    updateHedgeCalc(v);
  };
  slider.oninput = () => apply(slider.value);
  numInp.oninput = () => apply(numInp.value);
  numInp.onblur  = () => { numInp.value = parseFloat(numInp.value || '4.05').toFixed(4); };
  updateHedgeCalc(4.05);
}

function updateHedgeCalc(fut) {
  if (typeof fut !== 'number') {
    const s = document.getElementById('hedgeFutSlider');
    fut = s ? parseFloat(s.value) : 4.05;
  }
  const flat = +(fut - 0.08).toFixed(4);
  const physPnl = Math.round((flat - 3.97) * 1050000);
  const futPnl  = Math.round((4.05 - fut) * 1050000);
  const net     = physPnl + futPnl;
  const fmt = (n) => {
    if (n === 0) return '$0';
    const sign = n > 0 ? '+' : '−';
    return sign + '$' + Math.abs(n).toLocaleString('en-US');
  };
  // Update the exit-row breakdown in the physical block
  const exitFut1 = document.getElementById('hedgeExitFut1');
  if (exitFut1) exitFut1.textContent = '$' + fut.toFixed(4);
  const exitFlat = document.getElementById('hedgeExitFlat');
  if (exitFlat) exitFlat.textContent = '$' + flat.toFixed(4);
  // Update the exit-row in the financial block (buy-back price)
  const exitFut2 = document.getElementById('hedgeExitFut2');
  if (exitFut2) exitFut2.textContent = '$' + fut.toFixed(4);
  // Physical P&L
  const physEl = document.getElementById('hedgePhys');
  if (physEl) {
    physEl.textContent = fmt(physPnl);
    physEl.style.color = physPnl > 0 ? 'var(--buy)' : (physPnl < 0 ? 'var(--sell)' : 'var(--text)');
  }
  // Futures P&L
  const futEl = document.getElementById('hedgeFutPnl');
  if (futEl) {
    futEl.textContent = fmt(futPnl);
    futEl.style.color = futPnl > 0 ? 'var(--buy)' : (futPnl < 0 ? 'var(--sell)' : 'var(--text)');
  }
  // Net banner duplicates
  const phys2 = document.getElementById('hedgePhys2');
  if (phys2) phys2.textContent = fmt(physPnl);
  const fut2 = document.getElementById('hedgeFutPnl2');
  if (fut2) fut2.textContent = fmt(futPnl);
  // Net total
  const netEl = document.getElementById('hedgeNet');
  if (netEl) netEl.textContent = fmt(net);
}

function renderSubStep() {
  clearRiskAnim();
  const i = state.subStep;
  const total = SUB_STEPS.length;
  const step = SUB_STEPS[i - 1];

  document.getElementById('subStepNum').textContent = i;
  document.getElementById('subStepTotal').textContent = total;

  // Dots — clickable, with custom CSS tooltip showing the slide title
  let dotsHtml = '';
  for (let k = 1; k <= total; k++) {
    const fill = k === i ? 'var(--accent)' : (k < i ? '#a8a8ad' : '#d4d4d8');
    const ring = k === i ? 'box-shadow: 0 0 0 3px rgba(200,16,46,0.20);' : '';
    const tipText = SUB_STEPS[k-1].title.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    dotsHtml += `<span class="step-dot-wrap" onclick="jumpToStep(${k})"><span class="step-dot" style="background:${fill};${ring}"></span><span class="step-tip"><span class="step-tip-num">Concept ${k} of ${total}</span>${tipText}</span></span>`;
  }
  document.getElementById('subStepDots').innerHTML = dotsHtml;

  // Content
  document.getElementById('subStepContent').innerHTML = `
    <h2 style="font-size:24px; margin:0 0 16px; color:var(--accent); font-weight:700; letter-spacing:-0.3px;">${step.title}</h2>
    ${step.body}
  `;

  // Button states
  const back = document.getElementById('subBackBtn');
  const next = document.getElementById('subNextBtn');
  if (i === 1) { back.textContent = '← Back'; back.onclick = () => {}; back.disabled = true; back.style.opacity = 0.3; }
  else { back.textContent = '← Back'; back.onclick = () => subStep(-1); back.disabled = false; back.style.opacity = 1; }
  if (i === total) { next.textContent = 'End ✓'; next.onclick = () => {}; next.disabled = true; next.style.opacity = 0.3; }
  else { next.textContent = 'Next →'; next.onclick = () => subStep(1); next.disabled = false; next.style.opacity = 1; }

  // Initialize the interactive risk story when sub-step 4 is rendered (risk chart)
  if (i === 4) setupRiskInteractive();
  // Initialize the hedge calculator when sub-step 6 is rendered (hedge slider)
  if (i === 6) setupHedgeInteractive();
  // Initialize the spread-mechanics walkthrough when sub-step 13 is rendered
  if (i === 13) setupSpreadInteractive();
}

function subStep(delta) {
  const next = state.subStep + delta;
  if (next < 1 || next > SUB_STEPS.length) return;
  state.subStep = next;
  renderSubStep();
}

function jumpToStep(target) {
  if (target < 1 || target > SUB_STEPS.length) return;
  state.subStep = target;
  renderSubStep();
}

function flat(day) { return +(state.futPath[day] + state.basisPath[day]).toFixed(4); }

function fmt$(x) {
  const sign = x < 0 ? '-' : '';
  return sign + '$' + Math.abs(x).toLocaleString('en-US', { maximumFractionDigits: 0 });
}
function fmtPrice(x) {
  const sign = x < 0 ? '−' : '';
  return sign + '$' + Math.abs(x).toFixed(4).replace(/0+$/, '').replace(/\.$/, '.00');
}

function goto(n) {
  if (typeof clearRiskAnim === 'function') clearRiskAnim();
  state.stage = n;
  document.querySelectorAll('.stage').forEach((el, i) => el.classList.toggle('active', i + 1 === n));
  for (let i = 1; i <= 4; i++) {
    const p = document.getElementById('pill' + i);
    if (!p) continue;
    p.classList.remove('active', 'done');
    if (i === n) p.classList.add('active');
    else if (i < n) p.classList.add('done');
  }
  if (n === 1) renderSubStep();
  if (n === 3) renderStage4();
  if (n === 4) renderStage5();
}

function chooseStrategy(s) {
  state.strategy = s;
  const o = document.getElementById('cardOpen');
  const h = document.getElementById('cardHedge');
  o.style.borderColor = s === 'open' ? 'var(--accent)' : 'transparent';
  h.style.borderColor = s === 'hedge' ? 'var(--hedged)' : 'transparent';
  const btn = document.getElementById('confirmBtn');
  btn.disabled = false;
  btn.textContent = s === 'hedge'
    ? '🔒 Confirm: HEDGE — sell 25 HO @ $4.0500 →'
    : '📈 Confirm: STAY OPEN →';
}
function confirmChoice() {
  if (!state.strategy) return;
  goto(3);
}

function renderStage4() {
  // Set scenario text
  const sBox = document.getElementById('stage4Scenario');
  if (state.strategy === 'hedge') {
    sBox.innerHTML = `<strong>You hedged.</strong> Long 25 kb physical at $${INITIAL_FLAT.toFixed(4)} flat, short 25 HO at $${INITIAL_FUTURES.toFixed(4)}. Your P&amp;L is now driven by basis only. Watch what happens.`;
  } else if (state.strategy === 'open') {
    sBox.innerHTML = `<strong>You stayed open.</strong> Long 25 kb physical at $${INITIAL_FLAT.toFixed(4)} flat, no offsetting hedge. Every cent the screen moves hits your P&amp;L.`;
  } else {
    sBox.innerHTML = `<strong>Preview mode.</strong> Both strategies are shown for comparison. Go to <a href="#" onclick="goto(2);return false;" style="color:var(--accent);">Choose</a> to commit to one.`;
  }
  document.getElementById('yourLabel').textContent = state.strategy ? ('You: ' + (state.strategy === 'hedge' ? 'hedged' : 'open')) : 'No strategy picked yet';
  renderDayGrid();
  drawChart();
  updateTodayStats();
  const stepBtn = document.getElementById('stepBtn');
  const skipBtn = document.getElementById('skipBtn');
  if (state.currentDay >= NUM_DAYS) {
    stepBtn.disabled = true;
    skipBtn.disabled = true;
    stepBtn.textContent = 'All 10 days done';
    skipBtn.textContent = 'See result →';
    skipBtn.disabled = false;
    skipBtn.onclick = () => goto(4);
  } else {
    stepBtn.disabled = false;
    skipBtn.disabled = false;
    skipBtn.textContent = 'Play to Day 10';
    skipBtn.onclick = skipToEnd;
  }
}

function renderDayGrid() {
  const g = document.getElementById('dayGrid');
  let html = '';
  for (let d = 0; d <= NUM_DAYS; d++) {
    const cls = d === state.currentDay ? 'current' : (d < state.currentDay ? 'done' : '');
    const flatPx = flat(d);
    html += `<div class="day-cell ${cls}">
      <div class="d">${d === 0 ? 'D0' : 'D' + d}</div>
      <div class="p">$${flatPx.toFixed(4)}</div>
    </div>`;
  }
  g.innerHTML = html;
}

function updateTodayStats() {
  const d = state.currentDay;
  document.getElementById('dFlat').textContent = '$' + flat(d).toFixed(4);
  document.getElementById('dFut').textContent = '$' + state.futPath[d].toFixed(4);
  const b = state.basisPath[d];
  document.getElementById('dBasis').textContent = (b < 0 ? '−' : '') + '$' + Math.abs(b).toFixed(4);
}

function stepDay() {
  if (state.currentDay >= NUM_DAYS) { goto(4); return; }
  state.currentDay += 1;
  renderDayGrid();
  updateTodayStats();
  drawChart();
  if (state.currentDay >= NUM_DAYS) {
    document.getElementById('stepBtn').disabled = true;
    document.getElementById('stepBtn').textContent = 'All 10 days done';
    document.getElementById('skipBtn').textContent = 'See result →';
    document.getElementById('skipBtn').onclick = () => goto(4);
  }
}
function skipToEnd() {
  state.currentDay = NUM_DAYS;
  renderDayGrid();
  updateTodayStats();
  drawChart();
  goto(4);
}

// P&L calculations
function openPnl(day) {
  // (flat[day] - flat[0]) * VOLUME_GAL
  return (flat(day) - INITIAL_FLAT) * VOLUME_GAL;
}
function hedgePnl(day) {
  // physical P&L + futures short P&L
  // physical: (flat[day] - flat[0]) * VOLUME_GAL
  // futures short: (INITIAL_FUTURES - fut[day]) * VOLUME_GAL  (we sold at 3.06, mark-to-market loss when fut rises)
  // Net simplifies to: (basis[day] - basis[0]) * VOLUME_GAL
  return (state.basisPath[day] - INITIAL_BASIS) * VOLUME_GAL;
}

function drawChart() {
  const labels = [];
  for (let d = 0; d <= NUM_DAYS; d++) labels.push('D' + d);
  const openSeries = [], hedgedSeries = [];
  for (let d = 0; d <= NUM_DAYS; d++) {
    if (d > state.currentDay) { openSeries.push(null); hedgedSeries.push(null); continue; }
    openSeries.push(Math.round(openPnl(d)));
    hedgedSeries.push(Math.round(hedgePnl(d)));
  }
  const data = {
    labels,
    datasets: [
      { label: 'Stay open', data: openSeries, borderColor: '#D61F3A', backgroundColor: 'rgba(214,31,58,0.10)', tension: 0.2, fill: false, borderWidth: state.strategy === 'open' ? 4 : 2, borderDash: state.strategy === 'open' ? [] : [4,4] },
      { label: 'Hedged', data: hedgedSeries, borderColor: '#2A3F66', backgroundColor: 'rgba(42,63,102,0.10)', tension: 0.2, fill: false, borderWidth: state.strategy === 'hedge' ? 4 : 2, borderDash: state.strategy === 'hedge' ? [] : [4,4] }
    ]
  };
  if (chart) { chart.data = data; chart.update(); return; }
  chart = new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'line', data,
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false, callbacks: { label: (ctx) => ctx.dataset.label + ': ' + fmt$(ctx.parsed.y) } } },
      scales: {
        x: { ticks: { color: '#8B93A1' }, grid: { color: 'rgba(53,66,88,0.08)' } },
        y: { ticks: { color: '#8B93A1', callback: v => fmt$(v) }, grid: { color: 'rgba(53,66,88,0.08)' } }
      },
      interaction: { mode: 'nearest', axis: 'x', intersect: false }
    }
  });
}

function renderStage5() {
  if (!state.strategy) {
    document.getElementById('finalLabel').textContent = '—';
    document.getElementById('finalPnl').textContent = 'Pick a strategy first';
    document.getElementById('finalLedger').innerHTML = '<tr><td style="padding:18px; color:var(--muted);">Go back to <a href="#" onclick="goto(2);return false;" style="color:var(--accent);">Step 2 · Choose</a> to commit to hedge or stay open. Then advance through the 10 days to see your result here.</td></tr>';
    document.getElementById('counterOpen').textContent = '—';
    document.getElementById('counterHedge').textContent = '—';
    return;
  }
  const d = NUM_DAYS;
  const finalFut = state.futPath[d];
  const finalBasis = state.basisPath[d];
  const finalFlat = flat(d);

  const physicalPnl = (finalFlat - INITIAL_FLAT) * VOLUME_GAL;
  const futuresPnl = (INITIAL_FUTURES - finalFut) * VOLUME_GAL; // short futures: + when fut falls
  const openTotal = physicalPnl;
  const hedgeTotal = physicalPnl + futuresPnl;

  const yourPnl = state.strategy === 'hedge' ? hedgeTotal : openTotal;

  document.getElementById('finalLabel').textContent = state.strategy === 'hedge' ? 'HEDGED' : 'STAYED OPEN';
  document.getElementById('finalPnl').textContent = fmt$(yourPnl);

  const fLedger = document.getElementById('finalLedger');
  const futChange = finalFut - INITIAL_FUTURES;
  const basisChange = finalBasis - INITIAL_BASIS;
  const flatChange = finalFlat - INITIAL_FLAT;

  let html = `<thead><tr>
    <th class="l">Leg</th><th>Entry</th><th>Day 10</th><th>Change</th><th>P&L</th>
  </tr></thead><tbody>`;
  // Physical
  html += `<tr>
    <td class="l">Long 25 kb physical (Gulf Coast)</td>
    <td>$${INITIAL_FLAT.toFixed(4)}</td>
    <td>$${finalFlat.toFixed(4)}</td>
    <td>${flatChange >= 0 ? '+' : '−'}$${Math.abs(flatChange).toFixed(4)}</td>
    <td class="${physicalPnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmt$(physicalPnl)}</td>
  </tr>`;
  if (state.strategy === 'hedge') {
    html += `<tr>
      <td class="l">Short 25 HO futures</td>
      <td>$${INITIAL_FUTURES.toFixed(4)}</td>
      <td>$${finalFut.toFixed(4)}</td>
      <td>${futChange >= 0 ? '+' : '−'}$${Math.abs(futChange).toFixed(4)}</td>
      <td class="${futuresPnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmt$(futuresPnl)}</td>
    </tr>`;
    html += `<tr class="totals">
      <td class="l">NET (hedged)</td>
      <td colspan="2">Basis change: ${basisChange >= 0 ? '+' : '−'}$${Math.abs(basisChange).toFixed(4)}</td>
      <td>×</td>
      <td class="${hedgeTotal >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmt$(hedgeTotal)}</td>
    </tr>`;
  } else {
    html += `<tr class="totals">
      <td class="l">NET (open)</td>
      <td colspan="2">Flat change: ${flatChange >= 0 ? '+' : '−'}$${Math.abs(flatChange).toFixed(4)}</td>
      <td>×</td>
      <td class="${openTotal >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmt$(openTotal)}</td>
    </tr>`;
  }
  html += '</tbody>';
  fLedger.innerHTML = html;

  const counterOpen = document.getElementById('counterOpen');
  const counterHedge = document.getElementById('counterHedge');
  counterOpen.textContent = fmt$(openTotal);
  counterOpen.className = 'val ' + (openTotal >= 0 ? 'pnl-pos' : 'pnl-neg');
  counterHedge.textContent = fmt$(hedgeTotal);
  counterHedge.className = 'val ' + (hedgeTotal >= 0 ? 'pnl-pos' : 'pnl-neg');
}

function resetGame() {
  state = freshState();
  goto(1);
}

resetGame();

/* ========== QUIZ REVEAL ========== */
function revealQuiz(btn, explId) {
  const parent = btn.parentElement;
  const opts = parent.querySelectorAll('.quiz-opt');
  opts.forEach(o => {
    o.disabled = true;
    if (o.dataset.correct === 'true') o.classList.add('correct');
    else if (o === btn) o.classList.add('incorrect');
  });
  const expl = document.getElementById(explId);
  if (expl) { expl.classList.add('visible'); expl.style.display = 'block'; }
}
function resetQuiz(quizId) {
  const parent = document.getElementById(quizId);
  if (!parent) return;
  parent.querySelectorAll('.quiz-opt').forEach(o => { o.disabled = false; o.classList.remove('correct','incorrect'); });
  const expl = parent.querySelector('.quiz-expl');
  if (expl) { expl.classList.remove('visible'); expl.style.display = 'none'; }
}
</script>
